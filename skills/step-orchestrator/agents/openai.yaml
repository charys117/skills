interface:
  display_name: "Step Orchestrator"
  short_description: "Run a multi-agent step workflow from a step table with file-backed liveness, commit each approved step, and write status back."
  default_prompt: "Use the step-orchestrator skill with step source <source>, steps <range>, and workspace <path>. Run the implementer/reviewer loop until approval, use local runtime-state files for long-running rounds, commit each approved step, and write the result back to the step table."
policy:
  allow_implicit_invocation: true
