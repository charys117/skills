interface:
  display_name: "Step Orchestrator"
  short_description: "Run a multi-agent step workflow from a step table, commit each approved step, and write status back."
  default_prompt: "Use the step-orchestrator skill with step source <source>, steps <range>, and workspace <path>. Run the implementer/reviewer loop until approval, commit each approved step, and write the result back to the step table."
policy:
  allow_implicit_invocation: true
